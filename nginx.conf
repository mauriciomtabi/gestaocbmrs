server {
    listen 8080;
    server_name localhost;

    # Ensure .mjs files are served as JavaScript (required for PDF.js web worker)
    types {
        text/html                   html htm;
        text/css                    css;
        application/javascript      js mjs;
        application/json            json;
        image/png                   png;
        image/jpeg                  jpg jpeg;
        image/gif                   gif;
        image/svg+xml               svg;
        image/x-icon                ico;
        font/woff                   woff;
        font/woff2                  woff2;
        application/pdf             pdf;
        application/octet-stream    bin;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
}
