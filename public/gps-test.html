<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diagnóstico GPS — CBM</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 1rem; }
    h1 { font-size: 1.1rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; color: #60a5fa; margin-bottom: 1rem; }
    .card { background: #1e293b; border-radius: 1rem; padding: 1.25rem; margin-bottom: 1rem; border: 1px solid #334155; }
    .label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #64748b; margin-bottom: 0.25rem; }
    .value { font-size: 1rem; font-weight: 700; color: #f1f5f9; word-break: break-all; }
    .value.good { color: #4ade80; }
    .value.warn { color: #fbbf24; }
    .value.bad  { color: #f87171; }
    .btn { display: block; width: 100%; padding: 1rem; border-radius: 0.75rem; font-size: 0.75rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; border: none; cursor: pointer; margin-bottom: 0.75rem; transition: opacity 0.15s; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-blue  { background: #2563eb; color: #fff; }
    .btn-green { background: #16a34a; color: #fff; }
    .btn-red   { background: #dc2626; color: #fff; }
    .log { font-size: 0.65rem; background: #0f172a; border-radius: 0.5rem; padding: 0.75rem; max-height: 220px; overflow-y: auto; border: 1px solid #334155; font-family: monospace; line-height: 1.6; }
    .log-ok { color: #4ade80; }
    .log-err { color: #f87171; }
    .log-info { color: #94a3b8; }
    .maps-link { display: block; padding: 0.75rem 1rem; background: #059669; border-radius: 0.75rem; color: #fff; font-weight: 700; font-size: 0.75rem; text-align: center; text-decoration: none; margin-top: 0.5rem; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #ffffff44; border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <h1>📍 Diagnóstico GPS — CBM</h1>

  <!-- Status rápido -->
  <div class="card">
    <div class="label">Status</div>
    <div class="value" id="status">Aguardando...</div>
  </div>

  <!-- Coordenadas obtidas -->
  <div class="card">
    <div class="label">Latitude</div>
    <div class="value" id="lat">—</div>
    <br/>
    <div class="label">Longitude</div>
    <div class="value" id="lng">—</div>
    <br/>
    <div class="label">Precisão (metros)</div>
    <div class="value" id="acc">—</div>
    <br/>
    <div class="label">Método</div>
    <div class="value" id="method">—</div>
    <a id="mapsLink" class="maps-link" style="display:none" target="_blank">🗺 Abrir no Google Maps</a>
  </div>

  <!-- Botões de teste -->
  <button class="btn btn-blue"  id="btnGetCurrent" onclick="testGetCurrent()">
    Teste 1 — getCurrentPosition (Rápido)
  </button>
  <button class="btn btn-green" id="btnWatchHigh"  onclick="testWatch(true)">
    Teste 2 — watchPosition HIGH ACCURACY (GPS)
  </button>
  <button class="btn btn-green" id="btnWatchLow"   onclick="testWatch(false)">
    Teste 3 — watchPosition BAIXA PRECISÃO (Rede/Wi-Fi)
  </button>
  <button class="btn btn-red"   id="btnStop"       onclick="stopAll()" disabled>
    ⏹ Parar
  </button>

  <!-- Log -->
  <div class="card">
    <div class="label">Log em tempo real</div>
    <div class="log" id="log"></div>
  </div>

  <script>
    let watchId = null;
    let startTime = null;

    function log(msg, cls = 'log-info') {
      const el = document.getElementById('log');
      const elapsed = startTime ? ((Date.now() - startTime) / 1000).toFixed(1) + 's' : '—';
      el.innerHTML += `<div class="${cls}">[${elapsed}] ${msg}</div>`;
      el.scrollTop = el.scrollHeight;
    }

    function setStatus(msg, cls = '') {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'value ' + cls;
    }

    function displayPos(pos, method) {
      const lat = pos.coords.latitude.toFixed(6);
      const lng = pos.coords.longitude.toFixed(6);
      const acc = Math.round(pos.coords.accuracy);
      const elapsed = startTime ? ((Date.now() - startTime) / 1000).toFixed(1) : '?';

      document.getElementById('lat').textContent = lat;
      document.getElementById('lng').textContent = lng;
      document.getElementById('method').textContent = method;

      const accEl = document.getElementById('acc');
      accEl.textContent = `±${acc}m`;
      accEl.className = acc <= 30 ? 'value good' : acc <= 200 ? 'value warn' : 'value bad';

      const link = document.getElementById('mapsLink');
      link.href = `https://www.google.com/maps/search/?api=1&query=${lat},${lng}`;
      link.style.display = 'block';

      const cls = acc <= 30 ? 'log-ok' : acc <= 200 ? '' : 'log-err';
      log(`📍 ${method} | Lat:${lat} Lng:${lng} | ±${acc}m em ${elapsed}s`, cls);
      setStatus(`✓ Posição obtida em ${elapsed}s (±${acc}m)`, acc <= 200 ? 'good' : 'warn');
    }

    function setButtons(running) {
      ['btnGetCurrent','btnWatchHigh','btnWatchLow'].forEach(id => {
        document.getElementById(id).disabled = running;
      });
      document.getElementById('btnStop').disabled = !running;
    }

    function stopAll() {
      if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
      }
      setStatus('Parado.');
      setButtons(false);
      log('⏹ Watch parado.');
    }

    function clearLog() {
      document.getElementById('log').innerHTML = '';
      document.getElementById('lat').textContent = '—';
      document.getElementById('lng').textContent = '—';
      document.getElementById('acc').textContent = '—';
      document.getElementById('method').textContent = '—';
      document.getElementById('mapsLink').style.display = 'none';
      startTime = Date.now();
    }

    async function testGetCurrent() {
      stopAll();
      clearLog();
      setStatus('⏳ Solicitando posição...', '');
      setButtons(true);
      log('▶ getCurrentPosition iniciado (highAccuracy=true)');

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          displayPos(pos, 'getCurrentPosition');
          setButtons(false);
        },
        (err) => {
          const msgs = {1:'PERMISSION_DENIED',2:'POSITION_UNAVAILABLE',3:'TIMEOUT'};
          log(`❌ Erro ${err.code}: ${msgs[err.code] || err.message}`, 'log-err');
          setStatus(`Erro: ${msgs[err.code]}`, 'bad');
          setButtons(false);
        },
        { enableHighAccuracy: true, maximumAge: 0, timeout: 15000 }
      );
    }

    function testWatch(highAccuracy) {
      stopAll();
      clearLog();
      const label = highAccuracy ? 'watchPosition HIGH' : 'watchPosition LOW';
      setStatus(`⏳ ${label} rodando...`, '');
      setButtons(true);
      log(`▶ ${label} iniciado`);

      watchId = navigator.geolocation.watchPosition(
        (pos) => {
          displayPos(pos, label);
          // Mostra cada update sem parar — deixa o usuário decidir quando parar
        },
        (err) => {
          const msgs = {1:'PERMISSION_DENIED',2:'POSITION_UNAVAILABLE',3:'TIMEOUT'};
          log(`⚠ Erro ${err.code}: ${msgs[err.code] || err.message}`, 'log-err');
          if (err.code === 1) {
            setStatus('Permissão NEGADA', 'bad');
            setButtons(false);
          }
          // Codes 2,3 continuam tentando
        },
        {
          enableHighAccuracy: highAccuracy,
          maximumAge: 0,
          timeout: highAccuracy ? 30000 : 10000
        }
      );
    }
  </script>
</body>
</html>
