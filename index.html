
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestão CBM</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/T1nny2hc/Brasao-cbmrs.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1d4ed8" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Gestão CBM" />
    <link rel="apple-touch-icon" href="https://i.postimg.cc/T1nny2hc/Brasao-cbmrs.png" />
    <link rel="stylesheet" href="/index.css">
  </head>
  <body>
    <script>
      // Forçar a desinstalação de qualquer Service Worker antigo ANTES de carregar o app
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister();
          }
        });
      }
    </script>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
